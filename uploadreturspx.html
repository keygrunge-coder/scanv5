<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Upload Retur SPX</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
}

input,
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    box-sizing:border-box;
}

button{
    background:#0d6efd;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

#hasil{
    margin-top:20px;
    white-space:pre-wrap;
    font-family:monospace;
}
</style>

</head>
<body>

<div class="container">

<h2>UPLOAD RETUR SPX</h2>

<input
type="file"
id="file"
accept=".xlsx,.xls">

<button onclick="uploadSPX()">
Upload ke RETUR_SPX
</button>

<div id="hasil">
Belum ada file.
</div>

</div>

<script>

const APP_URL =
"https://script.google.com/macros/s/AKfycbwa0TkNJEaxsQ41EsiCjvI-gJ1-zL7BZEbdkYIMMOkFZ58PooFUEzX5mp0MLVZtKOxn9g/exec";

async function uploadSPX(){

    const hasil = document.getElementById("hasil");

    const file = document.getElementById("file").files[0];

    if(!file){
        alert("Pilih file Excel terlebih dahulu.");
        return;
    }

    hasil.innerHTML = "Membaca file...";

    const reader = new FileReader();

    reader.onload = async function(e){

        try{

            const workbook = XLSX.read(
                e.target.result,
                {
                    type:"binary"
                }
            );

            const sheet =
                workbook.Sheets[
                    workbook.SheetNames[0]
                ];

            const rows =
                XLSX.utils.sheet_to_json(
                    sheet,
                    {
                        header:1,
                        defval:""
                    }
                );

            hasil.innerHTML =
                "Mengupload " +
                (rows.length-1) +
                " data...";

            const response =
                await fetch(APP_URL,{
                    method:"POST",
                    body:JSON.stringify({
                        source:"uploadReturSPX",
                        rows:rows
                    })
                });

            const json =
                await response.json();

            if(json.status==="success"){

                hasil.innerHTML=
`Upload Berhasil

Total Data Baru : ${json.total}`;

            }else{

                hasil.innerHTML=
JSON.stringify(json,null,2);

            }

        }catch(err){

            hasil.innerHTML=
err.toString();

            console.error(err);

        }

    };

    reader.readAsBinaryString(file);

}

</script>

</body>
</html>
