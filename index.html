<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEKARFOOTWEAR - PUSAT KOMANDO V5</title>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --primary: #003399; --bg-body: #f8fafc; --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: var(--bg-body); padding: 10px; color: #334155; max-width: 500px; margin: 0 auto; }
        .header-box { background: var(--primary); color: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; text-align: center; }
        .btn-nav { background: #cc0000; color: white; border: none; padding: 8px 15px; font-weight: bold; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 5px; font-size: 13px; }
        .card { background: white; border-radius: 14px; padding: 14px; margin-bottom: 12px; box-shadow: var(--card-shadow); border: 1px solid #f1f5f9; }
        #bca-indicator { width: 70px; height: 70px; border-radius: 50%; background-color: #ff3333; margin: 10px auto; transition: background-color 0.3s ease; }
        #status-message { font-size: 15px; font-weight: bold; margin: 10px 0; text-align: center; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; background: black; min-height: 250px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        input { width: 100%; padding: 12px; border: 1.5px solid #cbd5e1; border-radius: 10px; margin-bottom: 8px; font-size: 14px; }
        #notif { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); width: calc(100% - 30px); max-width: 470px; z-index: 9999; padding: 14px; border-radius: 10px; font-weight: 700; text-align: center; display: none; }
        .success { background: #10b981; color: white; }
        .warning { background: #f59e0b; color: white; }
        .error { background: #ef4444; color: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; font-size: 13px; text-align: left; border-bottom: 1px solid #eee; }
        .badge { padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header-box">
        <h3>📦 SCANNER PAKET KELUAR V5</h3>
        <a href="retur.html" class="btn-nav">🔄 RETUR</a>
        <a href="upload.html" class="btn-nav">🔄 UPLOAD</a>
    </div>

    <div id="bca-indicator"></div>
    <div id="status-message">Menyalakan Kamera...</div>

    <div class="card">
        <div id="reader"></div>
        <button id="startBtn" class="btn btn-primary">Aktifkan Kamera Scanner</button>
    </div>

    <div class="card">
        <h3>Input Manual Resi</h3>
        <input type="text" id="manualResi" placeholder="Masukkan nomor resi...">
        <button id="manualBtn" class="btn btn-primary">Simpan Resi</button>
        <button onclick="bersihkanSistem()" class="btn" style="background:#64748b; color:white;">🗑 Hapus Cache & Riwayat</button>
    </div>

    <div id="notif"></div>

    <div class="card">
        <h3>Riwayat Terakhir</h3>
        <div style="max-height: 200px; overflow-y: auto;">
            <table><tbody id="historyBody"></tbody></table>
        </div>
    </div>

<script>
const APP_URL = "https://script.google.com/macros/s/AKfycbwa0TkNJEaxsQ41EsiCjvI-gJ1-zL7BZEbdkYIMMOkFZ58PooFUEzX5mp0MLVZtKOxn9g/exec";
let html5QrCode = null, isProcessing = false;
let scanHistory = JSON.parse(localStorage.getItem("scanHistory") || "[]");
renderHistory();

function startCamera() {
    if(html5QrCode) return;
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 200 }, (res) => {
        if(!isProcessing) { isProcessing = true; html5QrCode.pause(); saveResi(res.trim()); }
    }).then(() => setLampu('ijo', 'Sistem Siap!'));
}

async function saveResi(resi) {
    let resiUpper = resi.toUpperCase();
    const isSPX = resiUpper.startsWith("SPX");
    const isJNT = ["JX","JZ","JY","JT"].some(prefix => resiUpper.startsWith(prefix));

    if (!isSPX && !isJNT) {
        showNotif("⚠ FORMAT SALAH", "error");
        setTimeout(() => { isProcessing = false; html5QrCode.resume(); }, 1500);
        return;
    }

    setLampu('kuning', 'Mengirim...');
    try {
        const r = await fetch(APP_URL, { 
            method: "POST", 
            body: JSON.stringify({ action: "pengiriman", resi: resiUpper }) 
        });
        const json = await r.json();
        if(json.status === "success") {
            setLampu('ijo', 'Berhasil!');
            showNotif("✓ BERHASIL", "success");
            scanHistory.unshift({ resi: resiUpper, status: "SUKSES" });
        } else {
            setLampu('merah', 'Gagal/Dobel');
            showNotif("⚠ " + json.status.toUpperCase(), "error");
            scanHistory.unshift({ resi: resiUpper, status: json.status.toUpperCase() });
        }
    } catch(e) { setLampu('merah', 'Gagal Koneksi'); }
    localStorage.setItem("scanHistory", JSON.stringify(scanHistory.slice(0, 50)));
    renderHistory();
    setTimeout(() => { isProcessing = false; html5QrCode.resume(); }, 1500);
}

function setLampu(w, p) { document.getElementById('status-message').innerText = p; document.getElementById('bca-indicator').style.backgroundColor = w === 'ijo' ? '#00cc44' : (w === 'kuning' ? '#ffcc00' : '#ff3333'); }
function showNotif(t, c) { const n = document.getElementById("notif"); n.className = c; n.innerHTML = t; n.style.display = "block"; setTimeout(() => n.style.display = "none", 2000); }
function renderHistory() { document.getElementById("historyBody").innerHTML = scanHistory.slice(0,10).map(i => `<tr><td>${i.resi}</td><td><span class="badge">${i.status}</span></td></tr>`).join(''); }
function bersihkanSistem() { if(confirm("Hapus semua data?")) { localStorage.clear(); location.reload(); } }
document.getElementById("startBtn").onclick = startCamera;
document.getElementById("manualBtn").onclick = () => saveResi(document.getElementById("manualResi").value);
</script>
</body>
</html>
