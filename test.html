<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbwa0TkNJEaxsQ41EsiCjvI-gJ1-zL7BZEbdkYIMMOkFZ58PooFUEzX5mp0MLVZtKOxn9g/exec";

    function prosesTeks() {
        const text = document.getElementById("rawText").value;
        const blocks = text.split(/ID Pesanan:/i);
        let dataUpload = [];

        for (let i = 1; i < blocks.length; i++) {
            let block = blocks[i];
            
            // 1. Ekstrak Order ID
            let orderMatch = block.match(/\d{15,20}/);
            // 2. Ekstrak Resi
            let resiMatch = block.match(/(JX|JT|JZ|SPX)\d+/i);
            // 3. Ekstrak SKU (setelah "SKU Penjual:")
            let skuMatch = block.match(/SKU Penjual:\s*([^\n\r]+)/i);
            // 4. Ekstrak QTY (setelah "×")
            let qtyMatch = block.match(/×\s*(\d+)/);
            // 5. Ekstrak Status (Dibatalkan/Sedang transit)
            let statusMatch = block.match(/(Dibatalkan|Sedang transit|Pengantaran gagal)/i);
            // 6. Ekstrak Tgl (Format dd/mm/yyyy hh:mm:ss)
            let tglMatch = block.match(/(\d{2}\/\d{2}\/\d{4} \d{2}:\d{2}:\d{2})/);

            if (orderMatch && resiMatch) {
                dataUpload.push([
                    orderMatch[0],
                    resiMatch[0],
                    skuMatch ? skuMatch[1].trim() : "-",
                    qtyMatch ? qtyMatch[1] : "1",
                    statusMatch ? statusMatch[0] : "Normal",
                    tglMatch ? tglMatch[1] : "-"
                ]);
            }
        }

        if (dataUpload.length > 0) {
            document.getElementById("status").innerText = "Mengirim...";
            fetch(APP_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: "uploadManual", data: dataUpload })
            }).then(r => r.json()).then(() => {
                document.getElementById("status").innerText = "✅ Sukses terkirim!";
                document.getElementById("rawText").value = "";
            }).catch(() => {
                document.getElementById("status").innerText = "⚠️ Terkirim (cek sheet).";
            });
        } else {
            alert("Data tidak ditemukan.");
        }
    }
</script>
