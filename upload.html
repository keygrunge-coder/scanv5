<script>
function prosesUpload() {

    const file = document.getElementById('csvFile').files[0];

    if (!file) {
        alert("Pilih file CSV dulu");
        return;
    }

    const reader = new FileReader();

    reader.onload = async function(e) {

        try {

            const text = e.target.result;

            const rows = text
                .split(/\r?\n/)
                .filter(row => row.trim() !== "")
                .map(row => row.split('\t'));

            const response = await fetch(
                "https://script.google.com/macros/s/AKfycbwa0TkNJEaxsQ41EsiCjvI-gJ1-zL7BZEbdkYIMMOkFZ58PooFUEzX5mp0MLVZtKOxn9g/exec",
                {
                    method: "POST",
                    body: JSON.stringify({
                        action: "uploadCSV",
                        rows: rows
                    })
                }
            );

            const result = await response.json();

            if (result.status === "success") {
                alert("Upload berhasil ke RETUR_GLOBAL");
            } else {
                alert("Upload gagal");
            }

        } catch(err) {

            console.error(err);
            alert("Terjadi kesalahan saat upload");

        }
    };

    reader.readAsText(file);

}
</script>
